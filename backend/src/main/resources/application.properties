# ─── Database ───────────────────────────────────────────────
spring.config.import=optional:file:.env[.properties]
spring.datasource.url=jdbc:mysql://localhost:3306/paf_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA ────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── File Upload ─────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

# ─── App Config ──────────────────────────────────────────────
app.upload.dir=uploads/tickets
app.max.attachments=3
app.frontend.url=${APP_FRONTEND_URL:http://localhost:3001}

# ─── JWT ─────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:change-this-secret-in-backend-dot-env-please}
jwt.expiration=86400000

# ─── Google OAuth2 (optional — set env vars to enable) ───────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile

# ─── Logging ─────────────────────────────────────────────────
logging.level.com.paf=DEBUG
logging.level.org.springframework.security=INFO

# ─── Server ──────────────────────────────────────────────────
server.port=8080