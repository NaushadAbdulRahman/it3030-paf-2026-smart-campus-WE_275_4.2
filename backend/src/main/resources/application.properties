# ─── Database ───────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/paf_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA ────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── File Upload ─────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

# ─── App Config ──────────────────────────────────────────────
app.upload.dir=uploads/tickets
app.max.attachments=3
app.frontend.url=http://localhost:3001

# ─── JWT ─────────────────────────────────────────────────────
# Set this value through an environment variable or external config.
jwt.secret=${JWT_SECRET:}
jwt.expiration=86400000

# ─── Google OAuth2 (optional — set env vars to enable) ───────
# Set these values through environment variables or external config.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_OAUTH_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile

# ─── Logging ─────────────────────────────────────────────────
logging.level.com.paf=DEBUG
logging.level.org.springframework.security=INFO

# ─── Server ──────────────────────────────────────────────────
server.port=8080